          nullable: true
          description: 전체 학생 수
          example: 150
        percentile:
          type: number
          description: 백분율
          example: 92.4

    AcademicRecordCourses:
      type: object
      required:
        - major
        - liberal
        - etc
      properties:
        major:
          type: array
          description: 전공 과목 목록
          items:
            $ref: '#/components/schemas/StudentCourseDetail'
        liberal:
          type: array
          description: 교양 과목 목록. areaType이 선교인 과목은 liberalAreaCode를 포함할 수 있고, 선교가 아닌 과목은 해당 키가 응답에 포함되지 않습니다.
          items:
            $ref: '#/components/schemas/StudentCourseDetail'
        etc:
          type: array
          description: 기타 과목 목록
          items:
            $ref: '#/components/schemas/StudentCourseDetail'

    StudentCourseDetail:
      type: object
      required:
        - id
        - courseName
        - courseCode
        - areaType
        - credits
        - professor
        - grade
        - score
        - isRetake
        - isOnline
        - year
        - semester
        - originalScore
        - isRetakeDelete
      properties:
        id:
          type: string
          description: 수강 ID
          example: "123"
        courseName:
          type: string
          description: 과목명
          example: 기독교의 이해
        courseCode:
          type: string
          description: 학수번호
          example: GEN001
        areaType:
          type: string
          description: 영역 유형
          enum:
            - 중핵
            - 기교
            - 선교
            - 소교
            - 전교
            - 전취
            - 전핵
            - 전선
            - 일선
            - 복선
            - 복핵
            - 복교
            - 기타
          example: 선교
        rawAreaType:
          type: string
          nullable: true
          description: 포털 원본 이수 구분
          example: 교직
        credits:
          type: integer
          format: int32
          description: 학점
          example: 3
        professor:
          type: string
          description: 교수명
          example: 김교수
        grade:
          type: string
          description: 성적
          example: A+
        score:
          type: integer
          format: int32
          description: 실 점수
          example: 3
        isRetake:
          type: boolean
          description: 재수강 여부
          example: false
        isOnline:
          type: boolean
          description: 사이버 강의 여부
          example: false
        year:
          type: integer
          format: int32
          description: 이수 연도
          example: 2024
        semester:
          type: integer
          format: int32
          description: 이수 학기
          example: 10
        originalScore:
          type: integer
          format: int32
          description: 원점수
          example: 95
        liberalAreaCode:
          type: integer
          format: int32
          nullable: true
          description: 선교 영역 세부 코드. areaType이 선교인 과목에 한해 노출됩니다. areaType이 선교가 아닌 과목은 이 키가 응답에 포함되지 않습니다.
          example: 7
        isRetakeDelete:
          type: boolean
          description: 재수강 삭제 과목 여부
          example: false
