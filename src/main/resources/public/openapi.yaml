openapi: 3.0.1
info:
  title: Chukchuk Haksa API
  description: 척척학사 OpenAPI 문서입니다.
  version: 1.0.0

paths:
  /api/graduation/progress:
    get:
      tags:
        - Graduation
      summary: 졸업 요건 진행 상황 조회
      description: 로그인된 사용자의 졸업 요건 충족 여부와 외국어 졸업 인증 통과 여부를 조회합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 졸업 요건 충족 여부 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraduationProgressApiResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '404':
          description: 사용자 정보 또는 졸업 요건 정보 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'

  /api/users/signin:
    post:
      summary: 회원 가입 및 로그인
      description: OIDC 소셜 로그인으로 회원가입 및 로그인을 진행합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: 회원가입/로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignInResponse'
        '401':
          description: 토큰 유효성 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetail'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          oneOf:
            - type: object
            - type: array
            - type: string
            - type: number
            - type: boolean
            - nullable: true
        message:
          type: string
          nullable: true
        error:
          $ref: '#/components/schemas/ErrorDetail'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true
    SignInRequest:
      type: object
      required:
        - provider
        - id_token
        - nonce
      properties:
        provider:
          type: string
          description: OIDC Provider
          example: KAKAO
        id_token:
          type: string
          description: OIDC Provider에서 발급받은 ID 토큰
        nonce:
          type: string
          description: 로그인 시 사용한 nonce 값
          example: random_nonce_value
    SignInResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            isPortalLinked:
              type: boolean
        message:
          type: string
          nullable: true
        error:
          $ref: '#/components/schemas/ErrorDetail'

    GraduationProgressApiResponse:
      type: object
      required:
        - success
        - data
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/GraduationProgressResponse'
        message:
          type: string
          nullable: true
          example: 요청 성공
        error:
          $ref: '#/components/schemas/ErrorDetail'
          nullable: true

    GraduationProgressResponse:
      type: object
      required:
        - graduationProgress
        - languageCertNeedsRefresh
        - hasDifferentGraduationRequirement
      properties:
        graduationProgress:
          type: array
          description: 졸업 요건 영역별 이수 현황
          items:
            $ref: '#/components/schemas/AreaProgress'
        languageCertFulfilled:
          type: boolean
          nullable: true
          description: 외국어 졸업 인증 통과 여부. 새 크롤러 동기화 전이면 null
          example: true
        languageCertNeedsRefresh:
          type: boolean
          description: 외국어 졸업 인증 정보를 확인하려면 포털 새로고침이 필요한지 여부
          example: false
        hasDifferentGraduationRequirement:
          type: boolean
          description: 특정 학과/연도 예외로 기존과 다른 졸업요건이 적용되는지 여부
          example: false

    AreaProgress:
      type: object
      required:
        - areaType
        - requiredCredits
        - earnedCredits
        - completedElectiveCourses
        - courses
      properties:
        areaType:
          type: string
          description: 영역 유형
          enum:
            - 중핵
            - 기교
            - 선교
            - 소교
            - 전교
            - 전취
            - 전핵
            - 전선
            - 일선
            - 복선
            - 복핵
            - 복교
          example: 전핵
        requiredCredits:
          type: integer
          format: int32
          description: 해당 영역에서 필요한 학점
          example: 60
        earnedCredits:
          type: integer
          format: int32
          description: 학생이 이수한 학점
          example: 45
        requiredElectiveCourses:
          type: integer
          format: int32
          nullable: true
          description: 필수 선택 과목 수
          example: 2
        completedElectiveCourses:
          type: integer
          format: int32
          description: 학생이 이수한 선택 과목 수
          example: 1
        totalElectiveCourses:
          type: integer
          format: int32
          nullable: true
          description: 총 선택 과목 수
          example: 3
        courses:
          type: array
          description: 학생이 이수한 과목 목록
          items:
            $ref: '#/components/schemas/GraduationCourse'

    GraduationCourse:
      type: object
      required:
        - year
        - courseName
        - credits
        - grade
        - semester
      properties:
        year:
          type: integer
          format: int32
          description: 이수 연도
          example: 2023
        courseName:
          type: string
          description: 과목명
          example: 자료구조
        credits:
          type: integer
          format: int32
          description: 학점
          example: 3
        grade:
          type: string
          description: 성적
          example: A+
        semester:
          type: integer
          format: int32
          description: 이수 학기
          example: 10
