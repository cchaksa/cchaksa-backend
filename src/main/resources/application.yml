spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  profiles:
    active: local
    group:
      develop-shadow:
        - dev
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss
  config:
    import: optional:file:.env[.properties]
  lifecycle:
    timeout-per-shutdown-phase: 30s
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

server:
  port: 8080
  shutdown: graceful
  application:
    name: "chukchuk-haksa"

security:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: ${JWT_ACCESS_EXPIRATION}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION}
  appKey: ${APP_KEY}
  nativeAppKey: ${APP_NATIVE_KEY:}
  apple:
    client-id: ${APPLE_CLIENT_ID}
    allowed-client-ids: ${APPLE_ALLOWED_CLIENT_IDS:}
    issuer: ${APPLE_ISSUER:https://appleid.apple.com}
    keys-url: ${APPLE_KEYS_URL:https://appleid.apple.com/auth/keys}

crawler:
  base-url: ${CRAWLER_BASE_URL}

scraping:
  mode: ${SCRAPING_MODE:async}
  job:
    queue-url: ${SCRAPING_JOB_QUEUE_URL:}
  callback:
    hmac-secret: ${SCRAPING_CALLBACK_HMAC_SECRET:}
    allowed-skew-seconds: ${SCRAPING_CALLBACK_ALLOWED_SKEW_SECONDS:300}
  result-store:
    bucket: ${SCRAPING_RESULT_BUCKET:cck-develop-shadow-scrape-results-984762359128}
    prefix: ${SCRAPING_RESULT_PREFIX:develop-shadow/}
    region: ${SCRAPING_RESULT_REGION:ap-northeast-2}
    max-payload-bytes: ${SCRAPING_RESULT_MAX_PAYLOAD_BYTES:2097152}
    api-call-timeout-seconds: ${SCRAPING_RESULT_API_CALL_TIMEOUT_SECONDS:30}
    api-call-attempt-timeout-seconds: ${SCRAPING_RESULT_API_CALL_ATTEMPT_TIMEOUT_SECONDS:3}
  scheduler:
    enabled: ${SCRAPING_SCHEDULER_ENABLED:true}
  publisher:
    enabled: ${SCRAPING_PUBLISHER_ENABLED:true}
    fixed-delay-ms: ${SCRAPING_PUBLISHER_FIXED_DELAY_MS:10000}
    batch-size: ${SCRAPING_PUBLISHER_BATCH_SIZE:20}
    max-attempts: ${SCRAPING_PUBLISHER_MAX_ATTEMPTS:5}
    initial-backoff-seconds: ${SCRAPING_PUBLISHER_INITIAL_BACKOFF_SECONDS:5}
    max-backoff-seconds: ${SCRAPING_PUBLISHER_MAX_BACKOFF_SECONDS:300}
    api-call-timeout-seconds: ${SCRAPING_PUBLISHER_API_CALL_TIMEOUT_SECONDS:10}
    api-call-attempt-timeout-seconds: ${SCRAPING_PUBLISHER_API_CALL_ATTEMPT_TIMEOUT_SECONDS:5}
    metrics-refresh-ms: ${SCRAPING_PUBLISHER_METRICS_REFRESH_MS:60000}
    after-commit:
      executor-core-pool-size: ${SCRAPING_PUBLISHER_AFTER_COMMIT_CORE_POOL_SIZE:2}
      executor-max-pool-size: ${SCRAPING_PUBLISHER_AFTER_COMMIT_MAX_POOL_SIZE:4}
      queue-capacity: ${SCRAPING_PUBLISHER_AFTER_COMMIT_QUEUE_CAPACITY:100}
      max-attempts: ${SCRAPING_PUBLISHER_AFTER_COMMIT_MAX_ATTEMPTS:5}
      initial-delay-ms: ${SCRAPING_PUBLISHER_AFTER_COMMIT_INITIAL_DELAY_MS:250}
      max-delay-ms: ${SCRAPING_PUBLISHER_AFTER_COMMIT_MAX_DELAY_MS:5000}
  stale:
    enabled: ${SCRAPING_STALE_ENABLED:true}
    fixed-delay-ms: ${SCRAPING_STALE_FIXED_DELAY_MS:60000}
    timeout-seconds: ${SCRAPING_STALE_TIMEOUT_SECONDS:600}
    batch-size: ${SCRAPING_STALE_BATCH_SIZE:20}

springdoc:
  api-docs:
    enabled: true

sentry:
  traces-sample-rate: 1.0
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# ─────────────────────────────────────────
# 모니터링 및 관리 (Actuator & Metrics)
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info,metrics"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
    metrics:
      export:
        enabled: ${MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED:false}
        url: ${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
  # 기존 tracing 설정 유지
  tracing:
    enabled: true
  health:
    redis:
      enabled: false

logging:
  exclude:
    patterns:
      - /favicon.ico
      - ^/static/.*
      - ^/internal/.*
      - /docs

# ─────────────────────────────────────────
# Cache / Infra 전략 (기본값)
# ─────────────────────────────────────────
cache:
  type: local   # local | redis

portal:
  credential:
    store: local   # local | redis

infra:
  redis:
    enabled: false
